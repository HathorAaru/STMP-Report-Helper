<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Student Report Helper</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  </head>
  <body>
    <main class="app-shell">
      <section class="panel">
        <div class="heading">
          <p class="eyebrow">St Mary & St Pancras</p>
          <h1>Student Report Helper</h1>
        </div>

        {% if error %}
          <div class="alert">{{ error }}</div>
        {% endif %}

        <form action="{{ url_for('generate') }}" method="post" enctype="multipart/form-data">
          <div class="grid">
            <label>
              <span>Report template</span>
              <input type="file" name="template" accept=".docx" required>
            </label>
            <label>
              <span>Attendance spreadsheet</span>
              <input type="file" name="attendance" accept=".xlsx" required>
            </label>
            <label>
              <span>Attainment tracker</span>
              <input type="file" name="attainment" accept=".xlsx" required>
            </label>
            <label>
              <span>Class</span>
              <input type="text" name="class_name" value="5" required>
            </label>
            <label>
              <span>Teacher</span>
              <input type="text" name="teacher_name" value="Eden St John" required>
            </label>
          </div>

          <button type="submit">Generate Reports</button>
        </form>
      </section>
    </main>
  </body>
</html>
